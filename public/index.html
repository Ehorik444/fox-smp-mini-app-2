<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fox SMP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      text-align: center;
    }
    .header {
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 32px;
      color: #ff6b00;
    }
    .status {
      padding: 12px 24px;
      border-radius: 20px;
      background: #28a745;
      color: white;
      display: inline-block;
      font-weight: bold;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦊 Fox SMP</h1>
    <p>Ваш сервер выживания</p>
  </div>
  
  <div class="status">ОНЛАЙН</div>
  <p>Присоединяйся к нам!</p>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    console.log('✅ Mini App загружена');
  </script>
</body>
</html>

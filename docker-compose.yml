version: '3'

services:
  bot:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && node bot.js"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBAPP_URL=${WEBAPP_URL}
      - MC_HOST=${MC_HOST}
      - MC_PORT=${MC_PORT}
    volumes:
      - .:/app
    restart: unless-stopped

  web:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && node web.js"
    ports:
      - "3000:3000"
    environment:
      - MC_HOST=${MC_HOST}
      - MC_PORT=${MC_PORT}
      - PORT=3000
    volumes:
      - .:/app
    restart: unless-stopped
